<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>school grading systems</title>
  </head>
  <body>
    <h1>school grading systems</h1>
    <p>
      student name:
      <input type="text" id="inName">
    </p>
    <p>
      first semester grade:
      <input type="text" id="inGrade1" />
    </p>
    <p>
      second semester grade:
      <input type="text" id="inGrade2" />
    </p>
    <p>
      <input
        type="button"
        value="display average and situation"
        id="btResult"
      />
    </p>
    <h3 id="outAverage"></h3>
    <h3 id="outSituation"></h3>
    <script src="school.js"></script>
  </body>
</html>
